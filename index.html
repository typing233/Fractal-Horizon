<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分形探索器 - Mandelbrot & Julia Set Explorer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="fractal-canvas"></canvas>
    
    <div id="info-panel" class="panel">
        <h3>实时信息</h3>
        <div class="info-item">
            <span class="label">中心坐标:</span>
            <span class="value" id="center-coord">-0.500000, 0.000000i</span>
        </div>
        <div class="info-item">
            <span class="label">缩放倍数:</span>
            <span class="value" id="zoom-level">1.0x</span>
        </div>
        <div class="info-item">
            <span class="label">最大迭代:</span>
            <span class="value" id="max-iterations">256</span>
        </div>
        <div class="info-item">
            <span class="label">集类型:</span>
            <span class="value" id="fractal-type">Mandelbrot</span>
        </div>
    </div>
    
    <div id="control-panel" class="panel">
        <h3>控制面板</h3>
        
        <div class="control-group">
            <label for="fractal-type-select">集类型:</label>
            <select id="fractal-type-select">
                <option value="mandelbrot">Mandelbrot 集</option>
                <option value="julia">Julia 集</option>
            </select>
        </div>
        
        <div class="control-group">
            <label for="palette-select">调色板:</label>
            <select id="palette-select">
                <option value="fire">火焰</option>
                <option value="rainbow">彩虹</option>
                <option value="ocean">海洋</option>
                <option value="grayscale">灰度</option>
                <option value="vibrant">鲜艳</option>
            </select>
        </div>
        
        <div class="control-group">
            <label for="iterations-slider">最大迭代: <span id="iterations-value">256</span></label>
            <input type="range" id="iterations-slider" min="32" max="2048" value="256" step="16">
        </div>
        
        <div class="control-group" id="julia-params" style="display: none;">
            <label>Julia 参数:</label>
            <div class="param-inputs">
                <div>
                    <label>实部 (Re):</label>
                    <input type="number" id="julia-real" value="-0.7" step="0.01">
                </div>
                <div>
                    <label>虚部 (Im):</label>
                    <input type="number" id="julia-imag" value="0.27015" step="0.01">
                </div>
            </div>
        </div>
        
        <div class="control-group">
            <button id="reset-btn">重置视图</button>
        </div>
    </div>
    
    <div id="toggle-controls" class="toggle-btn">≡</div>
    
    <script src="fractal-explorer.js"></script>
</body>
</html>
